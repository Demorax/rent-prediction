# Conda environment for EstateShowCase
# Create with: conda env create -f environment.yml
# Activate with: conda activate estate

name: estate
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # Core ML (conda)
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - scipy>=1.11

  # Visualization
  - matplotlib>=3.8
  - seaborn>=0.13

  # Jupyter
  - jupyterlab>=4.0
  - ipykernel

  # Pip packages
  - pip
  - pip:
      # XGBoost (pip version uses system CUDA)
      - xgboost>=2.0.0

      # API
      - fastapi>=0.109.0
      - uvicorn[standard]>=0.27.0
      - pydantic>=2.5.0
      - python-multipart>=0.0.6
      - httpx>=0.26.0

      # ML tools
      - category-encoders>=2.6.0
      - optuna>=3.5.0
      - mlflow>=2.10.0

      # Monitoring
      - prometheus-client>=0.19.0
      - prometheus-fastapi-instrumentator>=6.1.0
      - loguru>=0.7.0

      # Data validation
      - pandera>=0.18.0

      # Testing & Code quality
      - pytest>=8.0.0
      - pytest-cov>=4.1.0
      - pytest-asyncio>=0.23.0
      - ruff>=0.2.0
      - pre-commit>=3.6.0

      # Visualization
      - plotly>=5.18.0

      # Utilities
      - python-dotenv>=1.0.0
      - tqdm>=4.66.0
